spring:
  application:
    name: ewcp-backend

  datasource:
    url: jdbc:mysql://localhost:3306/ewcp?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations:
        - classpath:db/migration/V1.0.0__init_user_table.sql
        - classpath:db/migration/V1.0.1__system_tables.sql
        - classpath:db/migration/V1.0.2__content_and_image.sql
        - classpath:db/migration/V1.0.3__content_rename_columns.sql
        - classpath:db/migration/V1.0.4__dict_tables.sql

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 8080

# JWT 配置
jwt:
  secret: ewcp-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000  # 24小时 (毫秒)
